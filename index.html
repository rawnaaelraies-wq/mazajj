<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مزاج كافيه</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Cairo',sans-serif;background:#0a0a0a;min-height:100vh;display:flex;justify-content:center;align-items:flex-start}
#app{width:100%;max-width:430px;min-height:100vh;background:#111;position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}

/* GOLD PALETTE */
:root{
  --gold:#C8A84B;
  --gold2:#e4c46a;
  --gold-dim:#C8A84B33;
  --dark:#111;
  --dark2:#1a1a1a;
  --dark3:#222;
  --dark4:#2a2a2a;
  --border:#C8A84B22;
  --text:#f0f0f0;
  --muted:#888;
}

/* HOME */
.home-header{
  background:linear-gradient(180deg,#000 0%,#0d0d0d 100%);
  padding:56px 20px 44px;
  text-align:center;
  position:relative;
  overflow:hidden;
  border-bottom:1px solid var(--border);
}
.home-header::before{
  content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);
  width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,#C8A84B15 0%,transparent 70%);
}
.home-cup{font-size:56px;margin-bottom:12px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.home-logo{font-size:38px;font-weight:700;color:var(--gold);letter-spacing:6px}
.home-sub{font-size:11px;color:#555;letter-spacing:4px;margin-top:5px;font-weight:400}
.home-tagline{font-size:13px;color:#666;margin-top:12px;letter-spacing:1px}

.home-body{flex:1;display:flex;flex-direction:column;gap:10px;padding:28px 20px}
.home-btn{
  width:100%;padding:16px 20px;border-radius:14px;font-size:15px;font-weight:600;
  cursor:pointer;border:none;display:flex;align-items:center;gap:12px;
  font-family:'Cairo',sans-serif;transition:all 0.2s;position:relative;overflow:hidden
}
.home-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background 0.2s}
.home-btn:active::after{background:rgba(255,255,255,0.08)}
.home-btn.gold{background:linear-gradient(135deg,#C8A84B,#e4c46a);color:#000;box-shadow:0 4px 20px #C8A84B30}
.home-btn.gold:hover{box-shadow:0 6px 28px #C8A84B50;transform:translateY(-1px)}
.home-btn.dark{background:var(--dark3);color:#ccc;border:1px solid #333}
.home-btn.dark:hover{border-color:#C8A84B55;color:var(--gold)}
.home-btn .btn-icon{font-size:22px;flex-shrink:0}
.home-btn .btn-arrow{margin-right:auto;color:inherit;opacity:0.5;font-size:18px}

/* TOP BAR */
.top-bar{
  background:#000;padding:14px 16px;display:flex;align-items:center;gap:12px;
  flex-shrink:0;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10
}
.top-bar h2{font-size:17px;font-weight:600;color:var(--gold)}
.back-btn{
  background:var(--dark3);border:1px solid #C8A84B44;color:var(--gold);
  width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s
}
.back-btn:hover{background:#C8A84B22}

/* TABS */
.tab-row{
  display:flex;overflow-x:auto;gap:6px;padding:12px 14px;
  background:#000;border-bottom:1px solid #1c1c1c;flex-shrink:0;scrollbar-width:none
}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{
  border:1px solid #333;background:var(--dark3);border-radius:20px;
  padding:7px 15px;font-size:12px;cursor:pointer;white-space:nowrap;
  color:#888;font-family:'Cairo',sans-serif;font-weight:500;transition:all 0.2s
}
.tab-btn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}

/* MENU ITEMS */
.items-list{flex:1;overflow-y:auto;padding:10px 12px}
.cat-header{
  padding:10px 4px 6px;font-size:13px;color:var(--gold);font-weight:600;
  letter-spacing:1px;opacity:0.8;border-bottom:1px solid var(--border);margin-bottom:6px
}
.item-card{
  display:flex;justify-content:space-between;align-items:center;
  padding:13px 15px;border:1px solid #222;border-radius:13px;margin-bottom:7px;
  background:var(--dark2);transition:border-color 0.2s
}
.item-card:hover{border-color:#C8A84B33}
.item-name{font-size:14px;font-weight:500;color:var(--text)}
.item-price{
  font-size:14px;font-weight:700;color:var(--gold);
  background:#C8A84B15;padding:4px 10px;border-radius:20px;white-space:nowrap
}

/* REVIEW */
.review-body{flex:1;overflow-y:auto;padding:14px}
.avg-badge{
  background:linear-gradient(135deg,#000,#1a1a1a);
  border:1px solid #C8A84B33;border-radius:16px;padding:20px;text-align:center;
  margin-bottom:18px;position:relative;overflow:hidden
}
.avg-badge::before{
  content:'';position:absolute;top:-30px;left:50%;transform:translateX(-50%);
  width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle,#C8A84B0a 0%,transparent 70%);
}
.avg-num{font-size:36px;font-weight:700;color:var(--gold)}
.avg-sub{font-size:12px;color:#666;margin-top:5px}
.stars-row{display:flex;gap:8px;justify-content:center;padding:16px 0 8px;direction:ltr}
.star-btn{font-size:30px;background:none;border:none;cursor:pointer;opacity:0.2;transition:all 0.15s}
.star-btn.active{opacity:1;transform:scale(1.15)}
.star-label{text-align:center;font-size:13px;color:#888;margin-bottom:14px;height:20px}
.field{
  width:100%;border:1px solid #2c2c2c;border-radius:11px;padding:11px 14px;
  font-size:14px;background:var(--dark3);color:var(--text);margin-bottom:10px;
  font-family:'Cairo',sans-serif;direction:rtl;transition:border-color 0.2s
}
textarea.field{min-height:85px;resize:none}
.field:focus{outline:none;border-color:#C8A84B66}
.gold-btn{
  width:100%;background:linear-gradient(135deg,#C8A84B,#e4c46a);color:#000;border:none;
  border-radius:13px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;
  margin-bottom:18px;font-family:'Cairo',sans-serif;transition:all 0.2s;
  box-shadow:0 4px 16px #C8A84B25
}
.gold-btn:hover{box-shadow:0 6px 24px #C8A84B45;transform:translateY(-1px)}
.reviews-section h3{font-size:13px;color:#555;margin-bottom:12px;letter-spacing:1px}

/* REVIEW CARD */
.review-item{
  border:1px solid #222;border-radius:15px;padding:14px 15px;
  margin-bottom:10px;background:var(--dark2)
}
.review-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.reviewer-name{font-size:14px;font-weight:600;color:var(--text)}
.review-stars{font-size:13px;direction:ltr}
.review-text{font-size:13px;color:#bbb;line-height:1.6;margin-bottom:11px}
.react-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.react-btn{
  background:var(--dark);border:1px solid #2c2c2c;border-radius:20px;
  padding:5px 12px;font-size:12px;cursor:pointer;color:#888;
  font-family:'Cairo',sans-serif;display:flex;align-items:center;gap:4px;transition:all 0.15s
}
.react-btn.liked{background:#C8A84B18;border-color:#C8A84B77;color:var(--gold)}
.react-btn .rc{font-size:14px}
.reply-toggle{
  background:none;border:none;color:#666;font-size:12px;cursor:pointer;
  font-family:'Cairo',sans-serif;margin-right:auto;transition:color 0.15s
}
.reply-toggle:hover{color:var(--gold)}
.replies-area{margin-top:11px;border-top:1px solid #2a2a2a;padding-top:11px;display:none}
.replies-area.open{display:block}
.reply-item{background:var(--dark);border-radius:10px;padding:9px 12px;margin-bottom:7px}
.reply-author{font-size:11px;font-weight:700;color:var(--gold);margin-bottom:3px}
.reply-text{font-size:12px;color:#bbb}
.reply-input-row{display:flex;gap:7px;margin-top:7px}
.reply-input{
  flex:1;border:1px solid #2c2c2c;border-radius:9px;padding:8px 11px;
  font-size:12px;background:var(--dark);color:var(--text);
  font-family:'Cairo',sans-serif;direction:rtl
}
.reply-input:focus{outline:none;border-color:#C8A84B55}
.reply-send{
  background:var(--gold);color:#000;border:none;border-radius:9px;
  padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif
}

/* BOTTOM NAV */
.bottom-nav{
  display:flex;background:#000;border-top:1px solid #1a1a1a;
  flex-shrink:0;position:sticky;bottom:0
}
.nav-btn{
  flex:1;padding:10px 4px 9px;background:none;border:none;cursor:pointer;
  font-size:10px;color:#555;display:flex;flex-direction:column;
  align-items:center;gap:3px;font-family:'Cairo',sans-serif;transition:color 0.2s
}
.nav-btn .nicon{font-size:20px}
.nav-btn.active{color:var(--gold)}

/* ADMIN */
.admin-body{flex:1;overflow-y:auto;padding:14px}
.admin-section{margin-bottom:20px}
.admin-section>h3{font-size:12px;color:#555;margin-bottom:12px;letter-spacing:2px;text-transform:uppercase}
.cat-label{font-size:12px;color:var(--gold);padding:9px 0 5px;font-weight:700;opacity:0.9}
.admin-item{
  display:flex;align-items:center;gap:8px;border:1px solid #222;
  border-radius:10px;padding:9px 12px;margin-bottom:5px;background:var(--dark2)
}
.admin-item-name{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.price-in{
  width:80px;border:1px solid #333;border-radius:7px;padding:5px 7px;
  font-size:12px;background:var(--dark);color:var(--text);text-align:center;
  font-family:'Cairo',sans-serif
}
.del-btn{background:none;border:none;color:#c0392b;cursor:pointer;font-size:18px;padding:0 3px;flex-shrink:0}
.add-form{
  background:var(--dark2);border:1px solid #222;border-radius:13px;
  padding:15px;margin-top:12px
}
.add-form label{font-size:12px;color:#666;display:block;margin-bottom:10px}
.add-form select,.add-form input{
  width:100%;border:1px solid #2c2c2c;border-radius:9px;padding:9px 11px;
  font-size:13px;background:var(--dark);color:var(--text);
  font-family:'Cairo',sans-serif;direction:rtl;margin-bottom:9px
}
.add-form select:focus,.add-form input:focus{outline:none;border-color:#C8A84B55}
.add-btn{
  width:100%;background:var(--gold);color:#000;border:none;border-radius:10px;
  padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif
}
.logout-btn{
  display:block;margin:4px auto 14px;background:none;border:1px solid #2c2c2c;
  border-radius:11px;padding:10px 26px;font-size:13px;color:#666;
  cursor:pointer;font-family:'Cairo',sans-serif;transition:all 0.2s
}
.logout-btn:hover{border-color:#C8A84B44;color:#888}

/* LOGIN */
.login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px}
.login-icon{font-size:56px;margin-bottom:16px}
.login-name{font-size:28px;font-weight:700;color:var(--gold);letter-spacing:4px;margin-bottom:4px}
.login-sub{font-size:12px;color:#555;margin-bottom:34px;letter-spacing:2px}
.login-err{font-size:13px;color:#e74c3c;margin-top:8px;display:none;text-align:center}

/* ADMIN REVIEWS */
.admin-rev-item{
  border:1px solid #222;border-radius:13px;padding:12px 14px;
  margin-bottom:8px;background:var(--dark2)
}
.admin-rev-top{display:flex;justify-content:space-between;align-items:flex-start}
.admin-rev-info{font-size:13px;color:var(--text);font-weight:600}
.admin-rev-text{font-size:12px;color:#888;margin-top:5px}
.admin-reply-row{display:flex;gap:7px;margin-top:10px}
.admin-reply-in{
  flex:1;border:1px solid #2c2c2c;border-radius:9px;padding:7px 10px;
  font-size:12px;background:var(--dark);color:var(--text);
  font-family:'Cairo',sans-serif;direction:rtl
}
.admin-reply-in:focus{outline:none;border-color:#C8A84B55}
.admin-reply-btn{
  background:var(--gold);color:#000;border:none;border-radius:9px;
  padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif
}

/* TOAST */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#000;padding:11px 24px;border-radius:30px;
  font-size:13px;font-weight:700;opacity:0;transition:opacity 0.25s;
  white-space:nowrap;pointer-events:none;z-index:999;
  box-shadow:0 4px 20px #C8A84B40
}
.toast.show{opacity:1}
.empty-state{text-align:center;padding:36px 20px;color:#444;font-size:13px}
.empty-icon{font-size:38px;margin-bottom:10px}

/* DECORATIVE DIVIDER */
.gold-divider{
  display:flex;align-items:center;gap:10px;padding:8px 0 4px;margin-bottom:4px
}
.gold-divider::before,.gold-divider::after{
  content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,#C8A84B33,transparent)
}
.gold-divider span{font-size:11px;color:#C8A84B66;letter-spacing:2px}
</style>
</head>
<body>
<div id="app">
  <div class="toast" id="toast"></div>

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="home-header">
      <span class="home-cup">☕</span>
      <div class="home-logo">مزاج كافيه</div>

      <div class="home-tagline">أهلاً بيك في مزاج</div>

        <span class="btn-icon">⭐</span> اكتب ريفيو
        <span class="btn-arrow">←</span>
      </button>
      <button class="home-btn dark" onclick="goTo('admin-login')">
        <span class="btn-icon">🛠</span> الأدمن
        <span class="btn-arrow">←</span>
      </button>
    </div>
    <div style="text-align:center;padding:0 20px 24px;color:#333;font-size:11px;letter-spacing:1px">
      ☕ مزاج كافيه — اتبسط
    </div>
  </div>

  <!-- MENU -->
  <div class="screen" id="screen-menu">
    <div class="top-bar">
      <button class="back-btn" onclick="goTo('home')">←</button>
      <h2>منيو مزاج كافيه</h2>
    </div>
    <div class="tab-row" id="tab-row"></div>
    <div class="items-list" id="items-list"></div>
    <div class="bottom-nav">
      <button class="nav-btn" onclick="goTo('home')"><span class="nicon">🏠</span>الرئيسية</button>
      <button class="nav-btn active"><span class="nicon">📋</span>المنيو</button>
      <button class="nav-btn" onclick="goTo('review')"><span class="nicon">⭐</span>ريفيو</button>
    </div>
  </div>

  <!-- REVIEW -->
  <div class="screen" id="screen-review">
    <div class="top-bar">
      <button class="back-btn" onclick="goTo('home')">←</button>
      <h2>اكتب ريفيو</h2>
    </div>
    <div class="review-body">
      <div class="avg-badge">
        <div class="avg-num" id="avg-num">—</div>
        <div class="avg-sub">متوسط تقييم العملاء</div>
      </div>
      <div class="stars-row">
        <button class="star-btn" onclick="setStar(1)">⭐</button>
        <button class="star-btn" onclick="setStar(2)">⭐</button>
        <button class="star-btn" onclick="setStar(3)">⭐</button>
        <button class="star-btn" onclick="setStar(4)">⭐</button>
        <button class="star-btn" onclick="setStar(5)">⭐</button>
      </div>
      <div class="star-label" id="star-label">اختر تقييمك</div>
      <input class="field" id="r-name" placeholder="اسمك (اختياري)" />
      <textarea class="field" id="r-text" placeholder="شاركنا رأيك في الكافيه..."></textarea>
      <button class="gold-btn" onclick="submitReview()">إرسال التقييم ✓</button>
      <div class="reviews-section">
        <h3>تقييمات العملاء</h3>
        <div id="reviews-list"></div>
      </div>
    </div>
    <div class="bottom-nav">
      <button class="nav-btn" onclick="goTo('home')"><span class="nicon">🏠</span>الرئيسية</button>
      <button class="nav-btn" onclick="goTo('menu')"><span class="nicon">📋</span>المنيو</button>
      <button class="nav-btn active"><span class="nicon">⭐</span>ريفيو</button>
    </div>
  </div>

  <!-- ADMIN LOGIN -->
  <div class="screen" id="screen-admin-login">
    <div class="top-bar">
      <button class="back-btn" onclick="goTo('home')">←</button>
      <h2>دخول الأدمن</h2>
    </div>
    <div class="login-wrap">
      <div class="login-icon">☕</div>
      <div class="login-name">مزاج</div>
      <div class="login-sub">لوحة التحكم</div>
      <input class="field" id="pw-input" type="password" placeholder="كلمة السر" style="text-align:center;" onkeydown="if(event.key==='Enter')adminLogin()" />
      <div class="login-err" id="login-err">كلمة السر غلط! حاول تاني</div>
      <button class="gold-btn" onclick="adminLogin()">دخول</button>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="screen" id="screen-admin">
    <div class="top-bar">
      <button class="back-btn" onclick="goTo('home')">←</button>
      <h2>لوحة الأدمن</h2>
    </div>
    <div class="admin-body">
      <div class="admin-section">
        <h3>المنيو</h3>
        <div id="admin-cats"></div>
        <div class="add-form">
          <label>إضافة صنف جديد</label>
          <select id="add-cat"></select>
          <input id="add-name" placeholder="اسم الصنف" />
          <input id="add-price" placeholder="السعر (مثال: 45 ج)" />
          <button class="add-btn" onclick="addItem()">+ إضافة</button>
        </div>
      </div>
      <div class="admin-section">
        <h3>الريفيوهات (<span id="rev-count">0</span>)</h3>
        <div id="admin-reviews"></div>
      </div>
      <button class="logout-btn" onclick="goTo('home')">خروج</button>
    </div>
  </div>
</div>

currentCat = Object.keys(menuData)[0];

function goTo(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-'+id).classList.add('active');
  window.scrollTo(0,0);
  if(id==='menu') renderMenu();
  if(id==='review') renderReviews();
  if(id==='admin') renderAdmin();
}

function renderMenu() {
  var cats = Object.keys(menuData);
  var tabRow = document.getElementById('tab-row');
  tabRow.innerHTML = '';
  cats.forEach(function(c) {
    var b = document.createElement('button');
    b.className = 'tab-btn' + (c===currentCat?' active':'');
    b.textContent = c;
    b.onclick = function(){ currentCat=c; renderMenu(); };
    tabRow.appendChild(b);
  });
  var list = document.getElementById('items-list');
  list.innerHTML = '';
  (menuData[currentCat]||[]).forEach(function(item,i){
    var d = document.createElement('div');
    d.className = 'item-card';
    d.innerHTML = '<div class="item-name">'+item.n+'</div><div class="item-price">'+item.p+'</div>';
    list.appendChild(d);
  });
}

function setStar(v) {
  starVal = v;
  document.querySelectorAll('.star-btn').forEach(function(b,i){ b.classList.toggle('active', i<v); });
  document.getElementById('star-label').textContent = starLabels[v];
}

function submitReview() {
  if(!starVal){ showToast('اختر تقييم بالنجوم أول'); return; }
  var name = document.getElementById('r-name').value.trim() || 'عميل';
  var text = document.getElementById('r-text').value.trim();
  if(!text){ showToast('اكتب كومنت'); return; }
  reviews.unshift({
    id: Date.now(),
    name: name,
    stars: starVal,
    text: text,
    likes: 0,
    hearts: 0,
    likedByMe: false,
    heartedByMe: false,
    replies: [],
    repliesOpen: false
  });
  document.getElementById('r-name').value='';
  document.getElementById('r-text').value='';
  setStar(0); starVal=0;
  document.getElementById('star-label').textContent='اختر تقييمك';
  document.querySelectorAll('.star-btn').forEach(function(b){ b.classList.remove('active'); });
  renderReviews();
  showToast('شكراً! تم إرسال تقييمك ✓');
}

function renderReviews() {
  var avg = reviews.length ? reviews.reduce(function(a,r){return a+r.stars;},0)/reviews.length : 0;
  document.getElementById('avg-num').textContent = reviews.length ? avg.toFixed(1)+' ⭐' : '—';
  var list = document.getElementById('reviews-list');
  list.innerHTML = '';
  if(!reviews.length){
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div>مفيش ريفيوهات لسه<br>كن أول واحد يكتب!</div>';
    return;
  }
  reviews.forEach(function(r, ri){
    var d = document.createElement('div');
    d.className = 'review-item';
    d.setAttribute('data-id', r.id);
    var repliesHtml = '';
    r.replies.forEach(function(rp){
      repliesHtml += '<div class="reply-item"><div class="reply-author">'+(rp.isAdmin?'☕ مزاج كافيه':rp.author)+'</div><div class="reply-text">'+esc(rp.text)+'</div></div>';
    });
    d.innerHTML =
      '<div class="review-top">'+
        '<span class="reviewer-name">'+esc(r.name)+'</span>'+
        '<span class="review-stars" style="direction:ltr">'+'⭐'.repeat(r.stars)+'</span>'+
      '</div>'+
      '<div class="review-text">'+esc(r.text)+'</div>'+
      '<div class="react-row">'+
        '<button class="react-btn'+(r.likedByMe?' liked':'')+'" onclick="toggleLike('+ri+',\'like\')">'+
          '<span class="rc">👍</span> <span>'+r.likes+'</span>'+
        '</button>'+
        '<button class="react-btn'+(r.heartedByMe?' liked':'')+'" onclick="toggleLike('+ri+',\'heart\')">'+
          '<span class="rc">❤️</span> <span>'+r.hearts+'</span>'+
        '</button>'+
        '<button class="reply-toggle" onclick="toggleReplies('+ri+')">💬 رد ('+(r.replies.length)+')</button>'+
      '</div>'+
      '<div class="replies-area'+(r.repliesOpen?' open':'')+'" id="rep-'+r.id+'">'+
        repliesHtml+
        '<div class="reply-input-row">'+
          '<input class="reply-input" id="ri-'+r.id+'" placeholder="اكتب رد..." />'+
          '<button class="reply-send" onclick="sendReply('+ri+')">إرسال</button>'+
        '</div>'+
      '</div>';
    list.appendChild(d);
  });
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleLike(ri, type){
  var r = reviews[ri];
  if(type==='like'){r.likedByMe=!r.likedByMe;r.likes+=r.likedByMe?1:-1;}
  else{r.heartedByMe=!r.heartedByMe;r.hearts+=r.heartedByMe?1:-1;}
  renderReviews();
}

function toggleReplies(ri){ reviews[ri].repliesOpen=!reviews[ri].repliesOpen; renderReviews(); }

function sendReply(ri){
  var r=reviews[ri];
  var inp=document.getElementById('ri-'+r.id);
  var txt=inp?inp.value.trim():'';
  if(!txt){showToast('اكتب رد');return;}
  r.replies.push({author:'أنت',text:txt,isAdmin:false});
  r.repliesOpen=true;
  renderReviews();
  showToast('تم إرسال الرد ✓');
}

function adminLogin() {
  var pw=document.getElementById('pw-input').value;
  if(pw===ADMIN_PW){
    document.getElementById('pw-input').value='';
    document.getElementById('login-err').style.display='none';
    goTo('admin');
  } else {
    document.getElementById('login-err').style.display='block';
  }
}

function renderAdmin() {
  var cats=Object.keys(menuData);
  var container=document.getElementById('admin-cats');
  container.innerHTML='';
  cats.forEach(function(cat){
    var lbl=document.createElement('div');
    lbl.className='cat-label';lbl.textContent=cat;
    container.appendChild(lbl);
    menuData[cat].forEach(function(item,i){
      var row=document.createElement('div');
      row.className='admin-item';
      var ck=cat.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      row.innerHTML='<span class="admin-item-name">'+item.n+'</span>'+
        '<input class="price-in" value="'+item.p+'" onchange="menuData[\''+ck+'\']['+i+'].p=this.value;showToast(\'تم حفظ السعر ✓\')" />'+
        '<button class="del-btn" onclick="delItem(\''+ck+'\','+i+')">✕</button>';
      container.appendChild(row);
    });
  });
  var addCat=document.getElementById('add-cat');
  addCat.innerHTML='';
  cats.forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;addCat.appendChild(o);});
  document.getElementById('rev-count').textContent=reviews.length;
  var rList=document.getElementById('admin-reviews');
  rList.innerHTML='';
  if(!reviews.length){
    rList.innerHTML='<div class="empty-state"><div class="empty-icon">💬</div>مفيش ريفيوهات لسه</div>';
    return;
  }
  reviews.forEach(function(r,i){
    var d=document.createElement('div');d.className='admin-rev-item';
    d.innerHTML=
      '<div class="admin-rev-top">'+
        '<div>'+
          '<div class="admin-rev-info">'+esc(r.name)+' — '+'⭐'.repeat(r.stars)+'</div>'+
          '<div class="admin-rev-text">'+esc(r.text)+'</div>'+
        '</div>'+
        '<button class="del-btn" onclick="delReview('+i+')">✕</button>'+
      '</div>'+
      '<div class="admin-reply-row">'+
        '<input class="admin-reply-in" id="ar-'+r.id+'" placeholder="رد كـ مزاج كافيه..." />'+
        '<button class="admin-reply-btn" onclick="adminReply('+i+')">رد</button>'+
      '</div>';
    rList.appendChild(d);
  });
}

function adminReply(ri){
  var r=reviews[ri];
  var inp=document.getElementById('ar-'+r.id);
  var txt=inp?inp.value.trim():'';
  if(!txt){showToast('اكتب الرد');return;}
  r.replies.push({author:'مزاج كافيه',text:txt,isAdmin:true});
  inp.value='';
  renderAdmin();
  showToast('تم إرسال الرد ✓');
}

function delItem(cat,i){menuData[cat].splice(i,1);renderAdmin();showToast('تم الحذف');}
function addItem(){
  var cat=document.getElementById('add-cat').value;
  var name=document.getElementById('add-name').value.trim();
  var price=document.getElementById('add-price').value.trim();
  if(!name||!price){showToast('اكتب الاسم والسعر');return;}
  menuData[cat].push({n:name,p:price});
  document.getElementById('add-name').value='';
  document.getElementById('add-price').value='';
  renderAdmin();showToast('تم الإضافة! ✓');
}
function delReview(i){reviews.splice(i,1);renderAdmin();showToast('تم حذف الريفيو');}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}
</script>
